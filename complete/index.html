<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#101719">
  <meta name="description" content="『未登録放送』完全インタラクティブ版。全38話と作中資料、地図、図版を収録。">
  <title>未登録放送｜完全インタラクティブ版</title>
  <link rel="stylesheet" href="complete.css">
</head>
<body>
  <a class="skip" href="#reader">本文へ移動</a>
  <header class="topbar">
    <a class="brand" href="../index.html"><span></span>UNREGISTERED BROADCAST</a>
    <nav aria-label="主要ナビゲーション">
      <button type="button" data-open="episodes">話数</button>
      <button type="button" data-open="evidence">資料</button>
      <button type="button" data-open="visuals">地図・図版</button>
      <a href="../trailer/index.html">予告版</a>
    </nav>
  </header>

  <main>
    <section class="opening" id="opening">
      <div class="opening-copy">
        <p class="kicker">CASE NS-2026-0723 / COMPLETE EDITION</p>
        <h1>未登録<span>放送</span></h1>
        <p class="lead">市の記録にない放送が、聞く者ごとに違う名前を呼ぶ。</p>
        <div class="opening-actions">
          <button id="start-reading" type="button">第1話から読む</button>
          <a href="../trailer/index.html">予告編を見る</a>
        </div>
        <dl class="case-stats">
          <div><dt>本文</dt><dd>全38話</dd></div>
          <div><dt>資料</dt><dd>12点</dd></div>
          <div><dt>形式</dt><dd>調査・考察型ホラー</dd></div>
        </dl>
      </div>
      <figure class="opening-visual">
        <img src="../assets/photos/old-n03-inspection.jpg" alt="山中に残された旧N-03防災無線子局。">
        <figcaption>NS-P02 / OLD N-03 INSPECTION</figcaption>
      </figure>
    </section>

    <section class="reader-shell" id="reader" aria-label="小説本文">
      <aside class="reader-rail" aria-label="読書進行">
        <div class="progress-ring" aria-hidden="true"><span id="progress-value">0%</span></div>
        <p id="episode-position">EP.01 / 38</p>
        <button type="button" data-open="episodes">目次を開く</button>
      </aside>

      <article class="reader-card">
        <header class="episode-head">
          <p id="episode-chapter">序章</p>
          <h2 id="episode-title">記録番号なし</h2>
          <div class="reader-controls" aria-label="表示設定">
            <button id="font-down" type="button" aria-label="文字を小さく">A−</button>
            <button id="font-up" type="button" aria-label="文字を大きく">A＋</button>
            <button id="theme-toggle" type="button">夜／紙</button>
          </div>
        </header>
        <div id="story-text" class="story-text"></div>
        <footer class="episode-nav">
          <button id="previous" type="button">← 前話</button>
          <button id="next" type="button">次話 →</button>
        </footer>
      </article>

      <aside class="context-panel" aria-label="現在の記録情報">
        <p class="mono">CURRENT DISCLOSURE</p>
        <h3>この時点の資料</h3>
        <div id="context-evidence"></div>
        <a href="https://nonamenonowork.github.io/narushiro-archive/">別サイトのARG資料照会端末を開く ↗</a>
      </aside>
    </section>

    <section class="visual-section" id="visual-section">
      <div class="section-title"><p>VISUAL RECORDS</p><h2>地図と図版</h2></div>
      <div class="visual-grid">
        <button class="visual-card" data-image="../assets/maps/narushiro-overview.svg" data-alt="鳴代市全域と主要地点の概略地図。"><img src="../assets/maps/narushiro-overview.svg" alt=""><span>鳴代市概略図</span></button>
        <button class="visual-card" data-image="../assets/maps/narusawa-1989-evacuation.svg" data-alt="1989年の避難経路と事故地点を示す地図。"><img src="../assets/maps/narusawa-1989-evacuation.svg" alt=""><span>1989年避難経路</span></button>
        <button class="visual-card" data-image="../assets/maps/narushiro-2026-route.svg" data-alt="2026年の申告地点と子局起動順を示す地図。"><img src="../assets/maps/narushiro-2026-route.svg" alt=""><span>2026年音列経路</span></button>
        <button class="visual-card" data-image="../assets/documents/broadcast-system.svg" data-alt="中央操作卓と局地接続の違いを示す設備構成図。"><img src="../assets/documents/broadcast-system.svg" alt=""><span>防災無線構成</span></button>
        <button class="visual-card" data-image="../assets/documents/audio-sync-comparison.svg" data-alt="三音源の環境音同期と人声様成分を比較する図。"><img src="../assets/documents/audio-sync-comparison.svg" alt=""><span>音声同期比較</span></button>
        <button class="visual-card" data-image="../assets/documents/evidence-cross-reference.svg" data-alt="十二資料の参照関係を示す図。"><img src="../assets/documents/evidence-cross-reference.svg" alt=""><span>証拠参照関係</span></button>
      </div>
    </section>
  </main>

  <dialog id="drawer" class="drawer">
    <div class="drawer-head"><h2 id="drawer-title">目次</h2><button id="drawer-close" type="button" aria-label="閉じる">×</button></div>
    <div id="drawer-content"></div>
  </dialog>

  <dialog id="lightbox" class="lightbox">
    <button id="lightbox-close" type="button" aria-label="閉じる">×</button>
    <img id="lightbox-image" alt="">
    <p id="lightbox-caption"></p>
  </dialog>

  <footer class="site-footer">
    <p>これはフィクションです。外部資料を閲覧しなくても物語は完結します。</p>
    <a href="../about.html">サイトについて</a>
  </footer>
  <script src="story-data.js"></script>
  <script src="complete.js"></script>
</body>
</html>
