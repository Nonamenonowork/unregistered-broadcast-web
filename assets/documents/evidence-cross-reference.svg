<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="t d"><title id="t">NS-D03 資料相互参照図</title><desc id="d">十二資料の引用・矛盾・同一現象への参照関係を示す。</desc><defs><marker id="a" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0l8 4-8 4z" fill="#809497"/></marker></defs><rect width="1200" height="760" fill="#121b1f"/><text x="48" y="52" fill="#edf1ee" font-family="sans-serif" font-size="27" font-weight="700">資料相互参照図</text><text x="48" y="80" fill="#91a2a5" font-family="sans-serif" font-size="14">矢印は「引用・参照」、赤線は「記述の不一致」。接続は因果関係を証明しない。</text><g fill="none" stroke="#60777c" stroke-width="2" marker-end="url(#a)" opacity=".8"><path d="M180 212C315 180 420 170 530 200"/><path d="M180 212C310 270 420 300 530 290"/><path d="M180 382C320 360 410 340 530 290"/><path d="M180 382C335 430 430 455 530 470"/><path d="M180 552C330 530 420 495 530 470"/><path d="M530 200C680 170 760 180 860 212"/><path d="M530 290C675 275 755 260 860 212"/><path d="M530 290C665 350 760 370 860 382"/><path d="M530 470C670 430 755 410 860 382"/><path d="M530 470C670 540 760 555 860 552"/><path d="M860 212C1000 250 1025 290 1020 360"/><path d="M860 382C980 382 1000 382 1020 382"/><path d="M860 552C990 500 1030 455 1020 405"/></g><g fill="none" stroke="#b8514b" stroke-width="3" stroke-dasharray="8 6"><path d="M180 212C310 500 680 620 860 552"/><path d="M180 552C380 650 710 640 860 552"/><path d="M530 200C680 90 930 110 1020 360"/></g>
<g font-family="sans-serif"><g fill="#213137" stroke="#668087" stroke-width="2"><rect x="60" y="172" width="240" height="80" rx="7"/><rect x="60" y="342" width="240" height="80" rx="7"/><rect x="60" y="512" width="240" height="80" rx="7"/><rect x="410" y="160" width="240" height="80" rx="7"/><rect x="410" y="250" width="240" height="80" rx="7"/><rect x="410" y="430" width="240" height="80" rx="7"/><rect x="740" y="172" width="240" height="80" rx="7"/><rect x="740" y="342" width="240" height="80" rx="7"/><rect x="740" y="512" width="240" height="80" rx="7"/></g><g fill="#edf1ee" font-size="16"><text x="80" y="203"><tspan fill="#83b5bf">A01</tspan> 障害受付票</text><text x="80" y="230" font-size="12" fill="#9eabad">三件・時刻差四十七秒</text><text x="80" y="373"><tspan fill="#83b5bf">A02</tspan> 避難事故報告</text><text x="80" y="400" font-size="12" fill="#9eabad">七名／計算上の八名</text><text x="80" y="543"><tspan fill="#83b5bf">A07</tspan> 寺院過去帳</text><text x="80" y="570" font-size="12" fill="#9eabad">七霊への訂正</text><text x="430" y="191"><tspan fill="#83b5bf">A03</tspan> 保守点検票</text><text x="430" y="218" font-size="12" fill="#9eabad">旧N-03再結線</text><text x="430" y="281"><tspan fill="#83b5bf">A04</tspan> 共有履歴</text><text x="430" y="308" font-size="12" fill="#9eabad">削除・差替・ハッシュ</text><text x="430" y="461"><tspan fill="#83b5bf">A06</tspan> 聞き取り記録</text><text x="430" y="488" font-size="12" fill="#9eabad">1998年の原話</text><text x="760" y="203"><tspan fill="#83b5bf">A05</tspan> 音声解析</text><text x="760" y="230" font-size="12" fill="#9eabad">共通環境音／27秒帯</text><text x="760" y="373"><tspan fill="#83b5bf">A08</tspan> 文字起こし群</text><text x="760" y="400" font-size="12" fill="#9eabad">同時刻・異なる呼名</text><text x="760" y="543"><tspan fill="#83b5bf">A09–11</tspan> 報道・掲示板・祭礼</text><text x="760" y="570" font-size="12" fill="#9eabad">公開された物語の層</text></g><circle cx="1060" cy="382" r="76" fill="#202e33" stroke="#d0aa5e" stroke-width="3"/><text x="1060" y="365" text-anchor="middle" fill="#d0aa5e" font-size="14">A12</text><text x="1060" y="391" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">未発表原稿</text><text x="1060" y="414" text-anchor="middle" fill="#9eabad" font-size="11">読者が触れる整理層</text><rect x="54" y="664" width="1092" height="55" fill="#1a282d" stroke="#44575c"/><text x="73" y="688" fill="#c8d1cf" font-size="13">非接続のまま残る問い：</text><text x="235" y="688" fill="#d0aa5e" font-size="13">声の発生源／八人目の実在／資料を読むことが新たな聴取になるか</text><text x="73" y="708" fill="#819194" font-size="11">NS-D03 v1.0　関係線を増やしても、空白を閉じない。</text></g></svg>
