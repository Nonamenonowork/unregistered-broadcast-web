<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" role="img" aria-labelledby="t d"><title id="t">NS-D01 防災無線系統・記録境界図</title><desc id="d">市役所操作卓から聞き手までの六層と、記録される情報・されない情報の境界を示す。</desc>
<defs><marker id="a" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0l9 4.5L0 9z" fill="#395c67"/></marker><pattern id="h" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><path d="M0 0v8" stroke="#a24b45" stroke-width="2"/></pattern></defs><rect width="1200" height="650" fill="#182226"/>
<text x="45" y="50" fill="#edf1ed" font-family="sans-serif" font-size="26" font-weight="700">防災無線系統・記録境界図</text><text x="45" y="78" fill="#9fb0b4" font-family="sans-serif" font-size="14">設備の作動記録は「誰に、何が聞こえたか」を保存しない。</text>
<g font-family="sans-serif"><g fill="#24343a" stroke="#6e8c94" stroke-width="2"><rect x="38" y="150" width="155" height="115" rx="8"/><rect x="230" y="150" width="155" height="115" rx="8"/><rect x="422" y="150" width="155" height="115" rx="8"/><rect x="614" y="150" width="155" height="115" rx="8"/><rect x="806" y="150" width="155" height="115" rx="8"/><rect x="998" y="150" width="155" height="115" rx="8"/></g>
<g fill="#eef3ef" text-anchor="middle"><text x="115" y="180" font-size="12">LAYER 1</text><text x="115" y="214" font-size="20" font-weight="700">操作卓</text><text x="307" y="180" font-size="12">LAYER 2</text><text x="307" y="214" font-size="20" font-weight="700">無線回線</text><text x="499" y="180" font-size="12">LAYER 3</text><text x="499" y="214" font-size="20" font-weight="700">中継局</text><text x="691" y="180" font-size="12">LAYER 4</text><text x="691" y="205" font-size="20" font-weight="700">屋外子局</text><text x="691" y="232" font-size="13">増幅・スピーカー</text><text x="883" y="180" font-size="12">LAYER 5</text><text x="883" y="205" font-size="20" font-weight="700">音響伝播</text><text x="883" y="232" font-size="13">地形・風・反射</text><text x="1075" y="180" font-size="12">LAYER 6</text><text x="1075" y="205" font-size="20" font-weight="700">聞き手</text><text x="1075" y="232" font-size="13">記憶・録音・証言</text></g>
<g stroke="#6e8c94" stroke-width="3" marker-end="url(#a)"><path d="M193 207h34"/><path d="M385 207h34"/><path d="M577 207h34"/><path d="M769 207h34"/><path d="M961 207h34"/></g>
<path d="M60 330H760" stroke="#62a276" stroke-width="3"/><text x="60" y="318" fill="#83bf92" font-size="14">行政ログが追跡できる範囲</text><path d="M760 292v76" stroke="#e7c15c" stroke-width="3" stroke-dasharray="6 5"/><text x="775" y="355" fill="#e7c15c" font-size="14">記録境界</text><path d="M807 330h330" stroke="#a56f76" stroke-width="3"/><text x="825" y="318" fill="#c78c94" font-size="14">観測・証言でしか追えない範囲</text>
<rect x="236" y="425" width="528" height="118" rx="8" fill="url(#h)" opacity=".28"/><rect x="236" y="425" width="528" height="118" rx="8" fill="none" stroke="#c96a60" stroke-width="2"/><text x="258" y="454" fill="#f1c7c2" font-size="18" font-weight="700">無許可の局地再接続</text><text x="258" y="483" fill="#e2e7e4" font-size="14">保守端末 → 旧系統制御器 → 旧N-03</text><text x="258" y="510" fill="#e2e7e4" font-size="14">中央操作卓を通らず、子局負荷のみ断片的に残る。</text><path d="M500 425V270" stroke="#c96a60" stroke-width="3" stroke-dasharray="8 6" marker-end="url(#a)"/><path d="M690 425V270" stroke="#c96a60" stroke-width="3" stroke-dasharray="8 6" marker-end="url(#a)"/>
<rect x="845" y="414" width="308" height="142" rx="8" fill="#202d31" stroke="#8b999c"/><text x="865" y="444" fill="#fff" font-size="17" font-weight="700">この図が証明できること</text><text x="865" y="474" fill="#a9d4b4">○ どの設備が、いつ作動したか</text><text x="865" y="501" fill="#dfb0b5">× 放送された音声の完全な内容</text><text x="865" y="528" fill="#dfb0b5">× 全員が同じ言葉を聞いたか</text><text x="45" y="612" fill="#8fa0a4" font-size="12">NS-D01 / 技術監修図 v1.0　ログ、録音、証言を同一欄に混在させないこと</text></g></svg>
